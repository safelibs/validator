name: ci

on:
  push:
  pull_request:

jobs:
  preflight:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Check remote tag reachability
        run: python3 tools/inventory.py --config repositories.yml --check-remote-tags

  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Run unit tests
        run: python3 -m unittest discover -s unit -v

  matrix-smoke:
    needs:
      - preflight
      - unit-tests
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Reset gated workspace
        run: rm -rf .work/ports artifacts site

      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Stage smoke libraries
        run: |
          python3 tools/stage_port_repos.py --config repositories.yml --workspace .work --dest-root .work/ports --libraries giflib libpng libjson libvips libuv

      - name: Run smoke matrix
        run: |
          bash test.sh --config repositories.yml --tests-root tests --port-root .work/ports --artifact-root artifacts --mode both --record-casts --library giflib --library libpng --library libjson --library libvips --library libuv

  full-matrix:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - preflight
      - unit-tests
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Reset gated workspace
        run: rm -rf .work/ports artifacts site

      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Stage hosted full manifest
        run: |
          hosted_libraries=()
          while IFS= read -r library; do
            if [ "$library" != "libarchive" ]; then
              hosted_libraries+=("$library")
            fi
          done < <(python3 tools/run_matrix.py --config repositories.yml --list-libraries)
          if [ "${#hosted_libraries[@]}" -eq 0 ]; then
            echo "no hosted libraries selected" >&2
            exit 1
          fi
          printf 'Hosted full matrix excludes privileged libarchive harness.\n'
          python3 tools/stage_port_repos.py --config repositories.yml --workspace .work --dest-root .work/ports --libraries "${hosted_libraries[@]}"

      - name: Run full matrix
        run: |
          hosted_library_args=()
          while IFS= read -r library; do
            if [ "$library" != "libarchive" ]; then
              hosted_library_args+=(--library "$library")
            fi
          done < <(python3 tools/run_matrix.py --config repositories.yml --list-libraries)
          if [ "${#hosted_library_args[@]}" -eq 0 ]; then
            echo "no hosted libraries selected" >&2
            exit 1
          fi
          set +e
          bash test.sh --config repositories.yml --tests-root tests --port-root .work/ports --artifact-root artifacts --mode both --record-casts "${hosted_library_args[@]}"
          matrix_exit_code=$?
          echo "matrix_exit_code=$matrix_exit_code" >>"$GITHUB_ENV"
          exit 0

      - name: Generate hosted proof and verify site
        if: ${{ always() }}
        run: |
          set +e
          site_exit_code=0
          python3 tools/verify_proof_artifacts.py \
            --config repositories.yml \
            --artifact-root artifacts \
            --exclude-library libarchive \
            --exclude-note 'libarchive requires a privileged local FUSE host and is verified outside hosted CI' \
            --proof-output artifacts/proof/hosted-validator-proof.json \
            --min-safe-workloads 250 \
            --min-total-workloads 500
          proof_exit_code=$?
          if [ "$proof_exit_code" -ne 0 ]; then
            site_exit_code=$proof_exit_code
          fi
          if [ "$site_exit_code" -eq 0 ]; then
            python3 tools/render_site.py \
              --results-root artifacts/results \
              --artifacts-root artifacts \
              --proof-path artifacts/proof/hosted-validator-proof.json \
              --output-root site
            render_exit_code=$?
            if [ "$render_exit_code" -ne 0 ]; then
              site_exit_code=$render_exit_code
            fi
          fi
          if [ "$site_exit_code" -eq 0 ]; then
            bash scripts/verify-site.sh \
              --config repositories.yml \
              --results-root artifacts/results \
              --artifacts-root artifacts \
              --proof-path artifacts/proof/hosted-validator-proof.json \
              --site-root site
            verify_exit_code=$?
            if [ "$verify_exit_code" -ne 0 ]; then
              site_exit_code=$verify_exit_code
            fi
          fi
          echo "site_exit_code=$site_exit_code" >>"$GITHUB_ENV"
          exit 0

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: artifacts

      - name: Upload site
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site

      - name: Fail after uploads when matrix or proof/site verification failed
        if: ${{ always() }}
        run: |
          if [ "${matrix_exit_code:-0}" -ne 0 ]; then
            exit "$matrix_exit_code"
          fi
          if [ "${site_exit_code:-0}" -ne 0 ]; then
            exit "$site_exit_code"
          fi
