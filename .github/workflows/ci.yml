name: ci

on:
  push:
  pull_request:

jobs:
  preflight:
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Check remote tag reachability
        run: python3 tools/inventory.py --config repositories.yml --check-remote-tags

  unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Run unit tests
        run: python3 -m unittest discover -s unit -v

  matrix-smoke:
    needs:
      - preflight
      - unit-tests
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Reset gated workspace
        run: rm -rf .work/ports artifacts site

      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Stage smoke libraries
        run: |
          python3 tools/stage_port_repos.py --config repositories.yml --workspace .work --dest-root .work/ports --libraries giflib libpng libjson libvips libuv

      - name: Run smoke matrix
        run: |
          bash test.sh --config repositories.yml --tests-root tests --port-root .work/ports --artifact-root artifacts --mode both --record-casts --library giflib --library libpng --library libjson --library libvips --library libuv

  full-matrix:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    needs:
      - preflight
      - unit-tests
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Reset gated workspace
        run: rm -rf .work/ports artifacts site

      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Stage hosted full manifest
        run: |
          hosted_libraries=()
          while IFS= read -r library; do
            if [ "$library" != "libarchive" ]; then
              hosted_libraries+=("$library")
            fi
          done < <(python3 tools/run_matrix.py --config repositories.yml --list-libraries)
          if [ "${#hosted_libraries[@]}" -eq 0 ]; then
            echo "no hosted libraries selected" >&2
            exit 1
          fi
          printf 'Hosted full matrix excludes privileged libarchive harness.\n'
          python3 tools/stage_port_repos.py --config repositories.yml --workspace .work --dest-root .work/ports --libraries "${hosted_libraries[@]}"

      - name: Run full matrix
        run: |
          hosted_library_args=()
          while IFS= read -r library; do
            if [ "$library" != "libarchive" ]; then
              hosted_library_args+=(--library "$library")
            fi
          done < <(python3 tools/run_matrix.py --config repositories.yml --list-libraries)
          if [ "${#hosted_library_args[@]}" -eq 0 ]; then
            echo "no hosted libraries selected" >&2
            exit 1
          fi
          set +e
          bash test.sh --config repositories.yml --tests-root tests --port-root .work/ports --artifact-root artifacts --mode both --record-casts "${hosted_library_args[@]}"
          matrix_exit_code=$?
          echo "matrix_exit_code=$matrix_exit_code" >>"$GITHUB_ENV"
          exit 0

      - name: Render site
        if: ${{ always() }}
        run: |
          python3 tools/render_site.py --results-root artifacts/results --artifacts-root artifacts --output-root site

      - name: Verify site
        if: ${{ always() }}
        run: |
          bash scripts/verify-site.sh --config repositories.yml --results-root artifacts/results --site-root site

      - name: Upload artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: artifacts
          path: artifacts

      - name: Upload site
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site

      - name: Fail after uploads when the aggregate matrix failed
        if: ${{ always() }}
        run: |
          if [ "${matrix_exit_code:-0}" -ne 0 ]; then
            exit "$matrix_exit_code"
          fi
