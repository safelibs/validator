name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Check testcase manifests
        run: make check-testcases

      - name: Run unit tests
        run: make unit
