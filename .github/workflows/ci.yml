name: ci

on:
  push:
  pull_request:

jobs:
  preflight:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Run unit tests
        run: python3 -m unittest discover -s unit -v

      - name: Check testcase manifests
        run: python3 tools/testcases.py --config repositories.yml --tests-root tests --check --min-source-cases 120 --min-usage-cases 723 --min-cases 843

  matrix-smoke:
    needs: preflight
    runs-on: ubuntu-24.04
    env:
      ARTIFACT_ROOT: .work/ci-smoke-artifacts
      SITE_ROOT: .work/ci-smoke-site
      PORT_DEB_ROOT: .work/ci-smoke-artifacts/debs/port-04-test
      PORT_LOCK_PATH: .work/ci-smoke-artifacts/proof/port-04-test-debs-lock.json
      ORIGINAL_PROOF_PATH: .work/ci-smoke-artifacts/proof/original-validation-proof.json
      PORT_PROOF_PATH: .work/ci-smoke-artifacts/proof/port-04-test-validation-proof.json
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Fetch port debs
        env:
          VALIDATOR_REPO_TOKEN: ${{ secrets.VALIDATOR_REPO_TOKEN }}
        run: |
          python3 tools/fetch_port_debs.py \
            --config repositories.yml \
            --port-repos inventory/github-port-repos.json \
            --output-root "$PORT_DEB_ROOT" \
            --lock-output "$PORT_LOCK_PATH" \
            --library cjson \
            --library libarchive \
            --library libuv \
            --library libwebp

      - name: Run representative matrices
        run: |
          set +e
          bash test.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --mode original \
            --record-casts \
            --library cjson \
            --library libarchive \
            --library libuv \
            --library libwebp
          original_matrix_exit=$?
          bash test.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --mode port-04-test \
            --override-deb-root "$PORT_DEB_ROOT" \
            --port-deb-lock "$PORT_LOCK_PATH" \
            --record-casts \
            --library cjson \
            --library libarchive \
            --library libuv \
            --library libwebp
          port_matrix_exit=$?
          set -e
          echo "original_matrix_exit=$original_matrix_exit" >> "$GITHUB_ENV"
          echo "port_matrix_exit=$port_matrix_exit" >> "$GITHUB_ENV"

      - name: Generate proofs
        run: |
          python3 tools/verify_proof_artifacts.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-output "$ORIGINAL_PROOF_PATH" \
            --mode original \
            --library cjson \
            --library libarchive \
            --library libuv \
            --library libwebp \
            --min-source-cases 20 \
            --min-usage-cases 41 \
            --min-cases 61 \
            --require-casts
          python3 tools/verify_proof_artifacts.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-output "$PORT_PROOF_PATH" \
            --mode port-04-test \
            --library cjson \
            --library libarchive \
            --library libuv \
            --library libwebp \
            --min-source-cases 20 \
            --min-usage-cases 41 \
            --min-cases 61 \
            --require-casts

      - name: Render site
        run: |
          python3 tools/render_site.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-path "$ORIGINAL_PROOF_PATH" \
            --proof-path "$PORT_PROOF_PATH" \
            --output-root "$SITE_ROOT"

      - name: Verify site
        run: |
          bash scripts/verify-site.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifacts-root "$ARTIFACT_ROOT" \
            --proof-path "$ORIGINAL_PROOF_PATH" \
            --proof-path "$PORT_PROOF_PATH" \
            --site-root "$SITE_ROOT"

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-smoke-validation
          path: |
            ${{ env.ARTIFACT_ROOT }}
            ${{ env.SITE_ROOT }}

      - name: Report validation status
        if: always()
        run: |
          python3 tools/report_ci_status.py \
            --original-matrix-exit "${original_matrix_exit:-0}" \
            --port-matrix-exit "${port_matrix_exit:-0}" \
            --original-proof-path "$ORIGINAL_PROOF_PATH" \
            --port-proof-path "$PORT_PROOF_PATH"

  full-matrix:
    needs: preflight
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    env:
      ARTIFACT_ROOT: .work/ci-full-artifacts
      SITE_ROOT: .work/ci-full-site
      PORT_DEB_ROOT: .work/ci-full-artifacts/debs/port-04-test
      PORT_LOCK_PATH: .work/ci-full-artifacts/proof/port-04-test-debs-lock.json
      ORIGINAL_PROOF_PATH: .work/ci-full-artifacts/proof/original-validation-proof.json
      PORT_PROOF_PATH: .work/ci-full-artifacts/proof/port-04-test-validation-proof.json
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Fetch port debs
        env:
          VALIDATOR_REPO_TOKEN: ${{ secrets.VALIDATOR_REPO_TOKEN }}
        run: |
          python3 tools/fetch_port_debs.py \
            --config repositories.yml \
            --port-repos inventory/github-port-repos.json \
            --output-root "$PORT_DEB_ROOT" \
            --lock-output "$PORT_LOCK_PATH"

      - name: Run full matrices
        run: |
          set +e
          bash test.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --mode original \
            --record-casts
          original_matrix_exit=$?
          bash test.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --mode port-04-test \
            --override-deb-root "$PORT_DEB_ROOT" \
            --port-deb-lock "$PORT_LOCK_PATH" \
            --record-casts
          port_matrix_exit=$?
          set -e
          echo "original_matrix_exit=$original_matrix_exit" >> "$GITHUB_ENV"
          echo "port_matrix_exit=$port_matrix_exit" >> "$GITHUB_ENV"

      - name: Generate proofs
        run: |
          python3 tools/verify_proof_artifacts.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-output "$ORIGINAL_PROOF_PATH" \
            --mode original \
            --min-source-cases 120 \
            --min-usage-cases 723 \
            --min-cases 843 \
            --require-casts
          python3 tools/verify_proof_artifacts.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-output "$PORT_PROOF_PATH" \
            --mode port-04-test \
            --min-source-cases 120 \
            --min-usage-cases 723 \
            --min-cases 843 \
            --require-casts

      - name: Render site
        run: |
          python3 tools/render_site.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-path "$ORIGINAL_PROOF_PATH" \
            --proof-path "$PORT_PROOF_PATH" \
            --output-root "$SITE_ROOT"

      - name: Verify site
        run: |
          bash scripts/verify-site.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifacts-root "$ARTIFACT_ROOT" \
            --proof-path "$ORIGINAL_PROOF_PATH" \
            --proof-path "$PORT_PROOF_PATH" \
            --site-root "$SITE_ROOT"

      - name: Upload validation artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-full-validation
          path: |
            ${{ env.ARTIFACT_ROOT }}
            ${{ env.SITE_ROOT }}

      - name: Report validation status
        if: always()
        run: |
          python3 tools/report_ci_status.py \
            --original-matrix-exit "${original_matrix_exit:-0}" \
            --port-matrix-exit "${port_matrix_exit:-0}" \
            --original-proof-path "$ORIGINAL_PROOF_PATH" \
            --port-proof-path "$PORT_PROOF_PATH"
