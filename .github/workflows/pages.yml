name: pages

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 22 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  preflight:
    runs-on: ubuntu-24.04
    outputs:
      libraries: ${{ steps.libs.outputs.libraries }}
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Run unit tests
        run: python3 -m unittest discover -s unit -v

      - name: Check testcase manifests
        run: python3 tools/testcases.py --config repositories.yml --tests-root tests --check --min-source-cases 120 --min-usage-cases 963 --min-cases 1083

      - id: libs
        name: Enumerate libraries
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import yaml
          manifest = yaml.safe_load(open('repositories.yml'))
          libraries = [entry['name'] for entry in manifest['libraries']]
          print('libraries=' + json.dumps(libraries))
          PY

  validate:
    needs: preflight
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 24
      matrix:
        library: ${{ fromJSON(needs.preflight.outputs.libraries) }}
    env:
      ARTIFACT_ROOT: .work/pages-artifacts
      PORT_DEB_ROOT: .work/pages-artifacts/debs/port-04-test
      PORT_LOCK_PATH: .work/pages-artifacts/proof/port-04-test-debs-lock.json
      PORT_SRC_ROOT: .work/pages-artifacts/sources/port-04-test
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Fetch port debs
        env:
          VALIDATOR_REPO_TOKEN: ${{ secrets.VALIDATOR_REPO_TOKEN }}
        run: |
          python3 tools/fetch_port_debs.py \
            --config repositories.yml \
            --port-repos inventory/github-port-repos.json \
            --output-root "$PORT_DEB_ROOT" \
            --lock-output "$PORT_LOCK_PATH" \
            --library ${{ matrix.library }}

      - name: Fetch port sources
        env:
          VALIDATOR_REPO_TOKEN: ${{ secrets.VALIDATOR_REPO_TOKEN }}
        run: |
          python3 tools/fetch_port_sources.py \
            --port-deb-lock "$PORT_LOCK_PATH" \
            --output-root "$PORT_SRC_ROOT" \
            --library ${{ matrix.library }}

      - name: Run library matrices
        run: |
          set +e
          bash test.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --mode original \
            --record-casts \
            --library ${{ matrix.library }}
          original_exit=$?
          bash test.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --mode port-04-test \
            --override-deb-root "$PORT_DEB_ROOT" \
            --port-deb-lock "$PORT_LOCK_PATH" \
            --record-casts \
            --library ${{ matrix.library }}
          port_exit=$?
          set -e
          mkdir -p "$ARTIFACT_ROOT/proof/library-status"
          python3 -c "import json,sys; json.dump({'library':sys.argv[1],'original_exit':int(sys.argv[2]),'port_exit':int(sys.argv[3])}, open(sys.argv[4],'w'))" \
            "${{ matrix.library }}" "$original_exit" "$port_exit" \
            "$ARTIFACT_ROOT/proof/library-status/${{ matrix.library }}.json"

      - name: Upload library artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lib-${{ matrix.library }}
          path: |
            .work/pages-artifacts/results
            .work/pages-artifacts/logs
            .work/pages-artifacts/casts
            .work/pages-artifacts/port-04-test
            .work/pages-artifacts/sources
            .work/pages-artifacts/proof/library-status
          retention-days: 14
          if-no-files-found: ignore

  collect:
    needs:
      - preflight
      - validate
    if: always() && needs.preflight.result == 'success'
    runs-on: ubuntu-24.04
    env:
      ARTIFACT_ROOT: .work/pages-artifacts
      SITE_ROOT: site
      PORT_SRC_ROOT: .work/pages-artifacts/sources/port-04-test
      ORIGINAL_PROOF_PATH: .work/pages-artifacts/proof/original-validation-proof.json
      PORT_PROOF_PATH: .work/pages-artifacts/proof/port-04-test-validation-proof.json
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Download per-library artifacts
        uses: actions/download-artifact@v4
        with:
          path: .work/pages-artifacts
          pattern: lib-*
          merge-multiple: true

      - name: Aggregate matrix exits
        id: matrix
        run: |
          original_max=0
          port_max=0
          shopt -s nullglob
          for f in "$ARTIFACT_ROOT"/proof/library-status/*.json; do
            o=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['original_exit'])" "$f")
            p=$(python3 -c "import json,sys; print(json.load(open(sys.argv[1]))['port_exit'])" "$f")
            (( o > original_max )) && original_max=$o
            (( p > port_max )) && port_max=$p
          done
          echo "original_matrix_exit=$original_max" >> "$GITHUB_OUTPUT"
          echo "port_matrix_exit=$port_max" >> "$GITHUB_OUTPUT"

      - name: Generate proofs
        run: |
          python3 tools/verify_proof_artifacts.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-output "$ORIGINAL_PROOF_PATH" \
            --mode original \
            --min-source-cases 120 \
            --min-usage-cases 963 \
            --min-cases 1083 \
            --require-casts \
            --ports-root "$PORT_SRC_ROOT"
          python3 tools/verify_proof_artifacts.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-output "$PORT_PROOF_PATH" \
            --mode port-04-test \
            --min-source-cases 120 \
            --min-usage-cases 963 \
            --min-cases 1083 \
            --require-casts \
            --ports-root "$PORT_SRC_ROOT"

      - name: Render site
        if: always()
        run: |
          python3 tools/render_site.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-path "$ORIGINAL_PROOF_PATH" \
            --proof-path "$PORT_PROOF_PATH" \
            --output-root "$SITE_ROOT"

      - name: Verify site
        if: always()
        run: |
          bash scripts/verify-site.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifacts-root "$ARTIFACT_ROOT" \
            --proof-path "$ORIGINAL_PROOF_PATH" \
            --proof-path "$PORT_PROOF_PATH" \
            --site-root "$SITE_ROOT"

      - uses: actions/configure-pages@v5
        if: github.ref == 'refs/heads/main'

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Report validation status
        if: always()
        run: |
          python3 tools/report_ci_status.py \
            --original-matrix-exit "${{ steps.matrix.outputs.original_matrix_exit }}" \
            --port-matrix-exit "${{ steps.matrix.outputs.port_matrix_exit }}" \
            --original-proof-path "$ORIGINAL_PROOF_PATH" \
            --port-proof-path "$PORT_PROOF_PATH"

  deploy-pages:
    needs: collect
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report-status:
    needs:
      - collect
      - deploy-pages
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Report matrix status
        run: |
          if [ "${{ needs.collect.result }}" != "success" ]; then
            exit 1
          fi
          deploy_result="${{ needs.deploy-pages.result }}"
          if [ "$deploy_result" != "success" ] && [ "$deploy_result" != "skipped" ]; then
            exit 1
          fi
