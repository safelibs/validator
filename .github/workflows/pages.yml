name: pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  full-matrix:
    runs-on: ubuntu-24.04
    outputs:
      original_matrix_exit: ${{ steps.matrix.outputs.original_matrix_exit }}
      port_matrix_exit: ${{ steps.matrix.outputs.port_matrix_exit }}
      original_proof_failed: ${{ steps.proof-failures.outputs.original_proof_failed }}
      port_proof_failed: ${{ steps.proof-failures.outputs.port_proof_failed }}
    env:
      ARTIFACT_ROOT: .work/pages-artifacts
      SITE_ROOT: site
      PORT_DEB_ROOT: .work/pages-artifacts/debs/port-04-test
      PORT_LOCK_PATH: .work/pages-artifacts/proof/port-04-test-debs-lock.json
      ORIGINAL_PROOF_PATH: .work/pages-artifacts/proof/original-validation-proof.json
      PORT_PROOF_PATH: .work/pages-artifacts/proof/port-04-test-validation-proof.json
    steps:
      - uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-yaml

      - name: Run unit tests
        run: python3 -m unittest discover -s unit -v

      - name: Check testcase manifests
        run: python3 tools/testcases.py --config repositories.yml --tests-root tests --check --min-source-cases 95 --min-usage-cases 193 --min-cases 288

      - name: Fetch port debs
        env:
          VALIDATOR_REPO_TOKEN: ${{ secrets.VALIDATOR_REPO_TOKEN }}
        run: |
          python3 tools/fetch_port_debs.py \
            --config repositories.yml \
            --port-repos inventory/github-port-repos.json \
            --output-root "$PORT_DEB_ROOT" \
            --lock-output "$PORT_LOCK_PATH"

      - name: Run full matrices
        id: matrix
        run: |
          set +e
          bash test.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --mode original \
            --record-casts
          original_matrix_exit=$?
          bash test.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --mode port-04-test \
            --override-deb-root "$PORT_DEB_ROOT" \
            --port-deb-lock "$PORT_LOCK_PATH" \
            --record-casts
          port_matrix_exit=$?
          set -e
          echo "original_matrix_exit=$original_matrix_exit" >> "$GITHUB_OUTPUT"
          echo "port_matrix_exit=$port_matrix_exit" >> "$GITHUB_OUTPUT"

      - name: Generate proofs
        run: |
          python3 tools/verify_proof_artifacts.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-output "$ORIGINAL_PROOF_PATH" \
            --mode original \
            --min-source-cases 95 \
            --min-usage-cases 193 \
            --min-cases 288 \
            --require-casts
          python3 tools/verify_proof_artifacts.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-output "$PORT_PROOF_PATH" \
            --mode port-04-test \
            --min-source-cases 95 \
            --min-usage-cases 193 \
            --min-cases 288 \
            --require-casts

      - name: Evaluate proof failures
        id: proof-failures
        if: always()
        run: |
          original_proof_failed=$(python3 -c 'import json, os; print(json.load(open(os.environ["ORIGINAL_PROOF_PATH"]))["totals"]["failed"])' 2>/dev/null || echo 1)
          port_proof_failed=$(python3 -c 'import json, os; print(json.load(open(os.environ["PORT_PROOF_PATH"]))["totals"]["failed"])' 2>/dev/null || echo 1)
          echo "original_proof_failed=$original_proof_failed" >> "$GITHUB_OUTPUT"
          echo "port_proof_failed=$port_proof_failed" >> "$GITHUB_OUTPUT"

      - name: Render site
        if: always()
        run: |
          python3 tools/render_site.py \
            --config repositories.yml \
            --tests-root tests \
            --artifact-root "$ARTIFACT_ROOT" \
            --proof-path "$ORIGINAL_PROOF_PATH" \
            --proof-path "$PORT_PROOF_PATH" \
            --output-root "$SITE_ROOT"

      - name: Verify site
        if: always()
        run: |
          bash scripts/verify-site.sh \
            --config repositories.yml \
            --tests-root tests \
            --artifacts-root "$ARTIFACT_ROOT" \
            --proof-path "$ORIGINAL_PROOF_PATH" \
            --proof-path "$PORT_PROOF_PATH" \
            --site-root "$SITE_ROOT"

      - uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy-pages:
    needs: full-matrix
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4

  report-status:
    needs:
      - full-matrix
      - deploy-pages
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Report matrix status
        run: |
          if [ "${{ needs.full-matrix.result }}" != "success" ]; then
            exit 1
          fi
          if [ "${{ needs.deploy-pages.result }}" != "success" ]; then
            exit 1
          fi
          original_matrix_exit="${{ needs.full-matrix.outputs.original_matrix_exit }}"
          port_matrix_exit="${{ needs.full-matrix.outputs.port_matrix_exit }}"
          original_proof_failed="${{ needs.full-matrix.outputs.original_proof_failed }}"
          port_proof_failed="${{ needs.full-matrix.outputs.port_proof_failed }}"
          if [ -z "$original_matrix_exit" ] || [ -z "$port_matrix_exit" ]; then
            exit 1
          fi
          if [ "$original_matrix_exit" -ne 0 ]; then
            exit "$original_matrix_exit"
          fi
          if [ "$port_matrix_exit" -ne 0 ]; then
            exit "$port_matrix_exit"
          fi
          if [ -z "$original_proof_failed" ] || [ "$original_proof_failed" -ne 0 ]; then
            exit 1
          fi
          if [ -z "$port_proof_failed" ] || [ "$port_proof_failed" -ne 0 ]; then
            exit 1
          fi
