schema_version = 1

[phase4_release_gate]
install_root = "../../../out/install/release-default"
helper_root = "../../../out/original-cli/lib"
metadata = "../../../out/deb/default/metadata.env"
policy = "The fuzz wrapper reuses these checked-in corpora offline and only overlays small upstream golden samples that are already in-tree."

[fallback_sets.raw]
path = "raw"
seed_source = "../../../../original/libzstd-1.5.5+dfsg2/tests/golden-compression/http"
usage = "raw-data fuzz targets and seekable roundtrip coverage"

[fallback_sets.compressed]
path = "compressed"
seed_source = "../../../../original/libzstd-1.5.5+dfsg2/tests/golden-decompression"
usage = "compressed-input fuzz targets"

[fallback_sets.dictionary]
path = "dictionary"
seed_source = "../../../../original/libzstd-1.5.5+dfsg2/tests/golden-dictionaries/http-dict-missing-symbols"
usage = "dictionary-aware fuzz targets"
