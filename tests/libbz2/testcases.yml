schema_version: 1
library: libbz2
apt_packages:
- libbz2-1.0
- libbz2-dev
- bzip2
testcases:
- id: cli-compress-decompress
  title: bzip2 command round trip
  description: Compresses and decompresses text through the installed bzip2 commands.
  kind: source
  command:
  - bash
  - /validator/tests/libbz2/tests/cases/source/cli-compress-decompress.sh
  timeout_seconds: 120
  tags:
  - cli
  - roundtrip
- id: stream-concatenation
  title: bzip2 stream concatenation
  description: Concatenates independent bzip2 streams and verifies continuous decompression output.
