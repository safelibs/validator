  command:
  - bash
  - /validator/tests/libexif/tests/cases/source/tag-lookup-value-formatting.sh
  timeout_seconds: 120
  tags:
  - api
  - format
- id: compile-link-smoke
  title: libexif compile link smoke
  description: Compiles and runs a small program against the public libexif headers.
  kind: source
  command:
  - bash
  - /validator/tests/libexif/tests/cases/source/compile-link-smoke.sh
  timeout_seconds: 120
  tags:
  - api
  - compile
- id: invalid-data-handling
  title: Invalid EXIF data handling
  description: Feeds invalid bytes through ExifLoader and confirms graceful empty handling.
