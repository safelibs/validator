  client_application: readstat
  command:
  - bash
  - /validator/tests/libcsv/tests/cases/usage/usage-readstat-csv-to-dta.sh
  timeout_seconds: 180
  tags:
  - usage
  - csv
- id: usage-readstat-dta-to-csv
  title: readstat DTA to CSV
  description: Runs readstat to convert a CSV-derived DTA dataset back to CSV and verifies row values.
