schema_version: 1
library: libarchive
apt_packages:
- libarchive13t64
- libarchive-dev
- libarchive-tools
testcases:
- id: bsdtar-tar-zip-roundtrip
  title: bsdtar tar and zip round trip
  description: Creates tar and zip archives then extracts both with bsdtar.
  kind: source
  command:
  - bash
  - /validator/tests/libarchive/tests/cases/source/bsdtar-tar-zip-roundtrip.sh
  timeout_seconds: 120
  tags:
  - cli
  - archive
- id: bsdcpio-copy-roundtrip
  title: bsdcpio copy archive round trip
  description: Copies files into and out of a newc archive using bsdcpio.
