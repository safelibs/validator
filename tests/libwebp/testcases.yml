schema_version: 1
library: libwebp
apt_packages:
- libwebp7
- libwebpdemux2
- libwebpmux3
- libwebpdecoder3
- libsharpyuv0
- libwebp-dev
- libsharpyuv-dev
- webp
testcases:
- id: cwebp-dwebp-roundtrip
  title: cwebp dwebp round trip
  description: Encodes a generated PPM image to WebP and decodes it.
  kind: source
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/source/cwebp-dwebp-roundtrip.sh
  timeout_seconds: 120
  tags:
  - cli
  - media
- id: webpinfo-inspection
  title: webpinfo inspection
  description: Inspects a checked-in WebP example through the webpinfo tool.
  kind: source
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/source/webpinfo-inspection.sh
  timeout_seconds: 120
  tags:
  - cli
  - metadata
- id: webpmux-metadata
  title: webpmux metadata behavior
  description: Adds EXIF metadata to a WebP file and reads mux information.
  kind: source
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/source/webpmux-metadata.sh
  timeout_seconds: 120
  tags:
  - cli
  - metadata
- id: decode-c-api-smoke
  title: libwebp C API decode smoke
  description: Compiles and runs a WebP decode API program against a fixture.
  kind: source
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/source/decode-c-api-smoke.sh
  timeout_seconds: 120
  tags:
  - api
  - compile
- id: malformed-webp-rejection
  title: Malformed WebP rejection
  description: Requires dwebp to fail on bytes that are not WebP data.
  kind: source
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/source/malformed-webp-rejection.sh
  timeout_seconds: 120
  tags:
  - cli
  - negative
- id: usage-python3-pil-open-webp
  title: Pillow open webp
  description: Opens a WebP fixture with Pillow and reads dimensions through libwebp.
  kind: usage
  client_application: python3-pil
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/usage/usage-python3-pil-open-webp.sh
  timeout_seconds: 180
  tags:
  - usage
  - image
  - python
- id: usage-python3-pil-convert-webp
  title: Pillow convert webp
  description: Converts a WebP fixture to PNG with Pillow through libwebp decoding.
  kind: usage
  client_application: python3-pil
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/usage/usage-python3-pil-convert-webp.sh
  timeout_seconds: 180
  tags:
  - usage
  - image
  - python
- id: usage-python3-pil-save-webp
  title: Pillow save webp
  description: Writes a WebP image with Pillow through libwebp encoding.
  kind: usage
  client_application: python3-pil
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/usage/usage-python3-pil-save-webp.sh
  timeout_seconds: 180
  tags:
  - usage
  - image
  - python
- id: usage-vips-webp-header
  title: vips webp header
  description: Reads WebP image metadata with vips through libwebp.
  kind: usage
  client_application: vips
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/usage/usage-vips-webp-header.sh
  timeout_seconds: 180
  tags:
  - usage
  - image
- id: usage-vips-webp-resize
  title: vips webp resize
  description: Resizes a WebP fixture with vips through libwebp decoding.
  kind: usage
  client_application: vips
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/usage/usage-vips-webp-resize.sh
  timeout_seconds: 180
  tags:
  - usage
  - image
- id: usage-ffmpeg-webp-decode
  title: ffmpeg webp decode
  description: Decodes a WebP fixture to PNG with FFmpeg through libwebp.
  kind: usage
  client_application: ffmpeg
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/usage/usage-ffmpeg-webp-decode.sh
  timeout_seconds: 180
  tags:
  - usage
  - image
- id: usage-ffmpeg-webp-probe
  title: ffmpeg webp probe
  description: Probes a WebP fixture with FFmpeg to read stream metadata through libwebp.
  kind: usage
  client_application: ffmpeg
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/usage/usage-ffmpeg-webp-probe.sh
  timeout_seconds: 180
  tags:
  - usage
  - image
- id: usage-webp-pixbuf-loader-pixbuf-thumbnail
  title: webp-pixbuf-loader pixbuf thumbnail
  description: Creates a GDK Pixbuf thumbnail from a WebP fixture through webp-pixbuf-loader.
  kind: usage
  client_application: webp-pixbuf-loader
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/usage/usage-webp-pixbuf-loader-pixbuf-thumbnail.sh
  timeout_seconds: 180
  tags:
  - usage
  - image
- id: usage-libsdl2-image-load-webp
  title: SDL2_image loads WebP
  description: Loads a WebP fixture with SDL2_image to exercise libwebp-backed image loading.
  kind: usage
  client_application: libsdl2-image
  command:
  - bash
  - /validator/tests/libwebp/tests/cases/usage/usage-libsdl2-image-load-webp.sh
  timeout_seconds: 180
  tags:
  - usage
  - image
  - compile
