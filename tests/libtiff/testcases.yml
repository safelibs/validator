schema_version: 1
library: libtiff
apt_packages:
- libtiff6
- libtiffxx6
- libtiff-dev
- libtiff-tools
testcases:
- id: tiffinfo-metadata
  title: tiffinfo metadata inspection
  description: Runs tiffinfo on a checked-in TIFF image and inspects dimensions.
  kind: source
  command:
  - bash
  - /validator/tests/libtiff/tests/cases/source/tiffinfo-metadata.sh
  timeout_seconds: 120
  tags:
  - cli
  - metadata
- id: tiffcp-copy
  title: tiffcp copy behavior
  description: Copies a TIFF fixture and confirms the copied image remains readable.
  kind: source
  command:
  - bash
  - /validator/tests/libtiff/tests/cases/source/tiffcp-copy.sh
  timeout_seconds: 120
  tags:
  - cli
  - media
- id: tiffdump-structure
  title: tiffdump structure inspection
  description: Runs tiffdump and checks expected TIFF structural tags are present.
  kind: source
  command:
  - bash
  - /validator/tests/libtiff/tests/cases/source/tiffdump-structure.sh
  timeout_seconds: 120
  tags:
  - cli
  - metadata
- id: c-api-read-write
  title: libtiff C API read write
  description: Compiles a libtiff program that writes and reads a small TIFF image.
  kind: source
  command:
  - bash
  - /validator/tests/libtiff/tests/cases/source/c-api-read-write.sh
  timeout_seconds: 120
  tags:
  - api
  - compile
- id: malformed-tiff-rejection
  title: Malformed TIFF rejection
  description: Requires tiffinfo to fail on bytes that are not a TIFF file.
  kind: source
  command:
  - bash
  - /validator/tests/libtiff/tests/cases/source/malformed-tiff-rejection.sh
  timeout_seconds: 120
  tags:
  - cli
  - negative
