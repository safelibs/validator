  tags:
  - usage
  - json
- id: usage-gdal-ogrinfo-sql-geojson
  title: GDAL SQL over GeoJSON
  description: Runs ogrinfo SQL against a GeoJSON fixture and verifies the projected feature value.
  kind: usage
  client_application: gdal
  command:
  - bash
  - /validator/tests/libjson/tests/cases/usage/usage-gdal-ogrinfo-sql-geojson.sh
