schema_version: 1
library: libjson
apt_packages:
- libjson-c5
- libjson-c-dev
testcases:
- id: tokener-parse
  title: json-c tokener parse
  description: Parses nested JSON through json-c tokener APIs and reads fields.
  kind: source
  command:
  - bash
  - /validator/tests/libjson/tests/cases/source/tokener-parse.sh
  timeout_seconds: 120
  tags:
  - api
  - parser
- id: serializer-roundtrip
  title: json-c serializer round trip
  description: Serializes an object then parses it again through json-c.
  kind: source
  command:
  - bash
  - /validator/tests/libjson/tests/cases/source/serializer-roundtrip.sh
  timeout_seconds: 120
  tags:
  - api
  - roundtrip
- id: refcount-object-mutation
  title: Refcount and object mutation
  description: Exercises json-c reference counting while mutating object members.
  kind: source
  command:
  - bash
  - /validator/tests/libjson/tests/cases/source/refcount-object-mutation.sh
  timeout_seconds: 120
  tags:
  - api
  - refcount
- id: compile-link-smoke
  title: json-c compile link smoke
  description: Compiles a small program against json-c headers and library.
  kind: source
  command:
  - bash
  - /validator/tests/libjson/tests/cases/source/compile-link-smoke.sh
  timeout_seconds: 120
  tags:
  - api
  - compile
- id: malformed-json-handling
  title: Malformed JSON handling
  description: Requires json-c tokener to report an error for malformed JSON.
  kind: source
  command:
  - bash
  - /validator/tests/libjson/tests/cases/source/malformed-json-handling.sh
  timeout_seconds: 120
  tags:
  - api
  - negative
- id: usage-gdal-ogrinfo-geojson
  title: GDAL reads GeoJSON
  description: Runs ogrinfo against a GeoJSON fixture to exercise json-c parsing through GDAL.
  kind: usage
  client_application: gdal
  command:
  - bash
  - /validator/tests/libjson/tests/cases/usage/usage-gdal-ogrinfo-geojson.sh
  timeout_seconds: 180
  tags:
  - usage
  - json
  - cli
- id: usage-ttyd-loopback-index
  title: ttyd loopback web session
  description: Starts ttyd on loopback and requests its web page to exercise json-c through a service-style client.
  kind: usage
  client_application: ttyd
  command:
  - bash
  - /validator/tests/libjson/tests/cases/usage/usage-ttyd-loopback-index.sh
  timeout_seconds: 180
  tags:
  - usage
  - service
  - json
- id: usage-gdal-ogrinfo-filter-geojson
  title: GDAL filters GeoJSON
  description: Runs ogrinfo with an attribute filter against a GeoJSON fixture and verifies the selected feature.
  kind: usage
  client_application: gdal
  command:
  - bash
  - /validator/tests/libjson/tests/cases/usage/usage-gdal-ogrinfo-filter-geojson.sh
  timeout_seconds: 180
  tags:
  - usage
  - json
- id: usage-gdal-ogr2ogr-copy-geojson
  title: GDAL copies GeoJSON
  description: Runs ogr2ogr to copy a GeoJSON fixture and verifies the copied feature data.
  kind: usage
  client_application: gdal
  command:
  - bash
  - /validator/tests/libjson/tests/cases/usage/usage-gdal-ogr2ogr-copy-geojson.sh
  timeout_seconds: 180
  tags:
  - usage
  - json
- id: usage-gdal-ogr2ogr-csv-geojson
  title: GDAL converts GeoJSON to CSV
  description: Runs ogr2ogr to convert GeoJSON feature properties to CSV output.
  kind: usage
  client_application: gdal
  command:
  - bash
  - /validator/tests/libjson/tests/cases/usage/usage-gdal-ogr2ogr-csv-geojson.sh
