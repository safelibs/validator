  - usage
  - json
- id: usage-gdal-ogr2ogr-gpkg-geojson
  title: GDAL converts GeoJSON to GeoPackage
  description: Runs ogr2ogr to convert GeoJSON into GeoPackage and verifies the resulting layer metadata.
  kind: usage
