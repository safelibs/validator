  client_application: gdal
  command:
  - bash
  - /validator/tests/libjson/tests/cases/usage/usage-gdal-ogrinfo-geojson.sh
  timeout_seconds: 180
  tags:
  - usage
  - json
  - cli
- id: usage-ttyd-loopback-index
  title: ttyd loopback web session
