schema_version: 1
library: giflib
apt_packages:
- libgif7
- libgif-dev
- giflib-tools
testcases:
- id: giftext-metadata
  title: giftext metadata inspection
  description: Inspects GIF metadata from an upstream sample with the giftext tool.
  kind: source
  command:
  - bash
  - /validator/tests/giflib/tests/cases/source/giftext-metadata.sh
  timeout_seconds: 120
  tags:
  - cli
  - metadata
- id: gif2rgb-conversion
  title: gif2rgb RGB conversion
  description: Converts a sample GIF to raw RGB bytes and compares the fixture length.
  kind: source
  command:
  - bash
  - /validator/tests/giflib/tests/cases/source/gif2rgb-conversion.sh
  timeout_seconds: 120
  tags:
  - cli
  - media
- id: gifbuild-roundtrip
  title: gifbuild textual round trip
  description: Dumps a GIF to textual form and rebuilds an equivalent GIF stream.
  kind: source
  command:
  - bash
  - /validator/tests/giflib/tests/cases/source/gifbuild-roundtrip.sh
  timeout_seconds: 120
  tags:
  - cli
  - roundtrip
- id: interlaced-fixture-handling
  title: Interlaced GIF fixture handling
  description: Converts an interlaced GIF fixture and compares the expected RGB output.
  kind: source
  command:
  - bash
  - /validator/tests/giflib/tests/cases/source/interlaced-fixture-handling.sh
  timeout_seconds: 120
  tags:
  - cli
  - media
- id: malformed-gif-rejection
  title: Malformed GIF rejection
  description: Confirms truncated GIF input is rejected by an installed giflib tool.
  kind: source
  command:
  - bash
  - /validator/tests/giflib/tests/cases/source/malformed-gif-rejection.sh
  timeout_seconds: 120
  tags:
  - cli
  - negative
- id: usage-giflib-tools-giftext-headers
  title: giflib-tools giftext headers
  description: Runs giflib-tools giftext headers on a GIF fixture and checks image metadata.
  kind: usage
  client_application: giflib-tools
  command:
  - bash
  - /validator/tests/giflib/tests/cases/usage/usage-giflib-tools-giftext-headers.sh
  timeout_seconds: 180
  tags:
  - usage
  - cli
  - image
- id: usage-giflib-tools-gif2rgb-convert
  title: giflib-tools gif2rgb convert
  description: Runs giflib-tools gif2rgb convert on a GIF fixture and checks image metadata.
  kind: usage
  client_application: giflib-tools
  command:
  - bash
  - /validator/tests/giflib/tests/cases/usage/usage-giflib-tools-gif2rgb-convert.sh
  timeout_seconds: 180
  tags:
  - usage
  - cli
  - image
- id: usage-giflib-tools-giffix-copy
  title: giflib-tools giffix copy
  description: Runs giflib-tools giffix copy on a GIF fixture and checks image metadata.
  kind: usage
  client_application: giflib-tools
  command:
  - bash
  - /validator/tests/giflib/tests/cases/usage/usage-giflib-tools-giffix-copy.sh
  timeout_seconds: 180
  tags:
  - usage
  - cli
  - image
- id: usage-giflib-tools-gifclrmp-map
  title: giflib-tools gifclrmp map
  description: Runs giflib-tools gifclrmp map on a GIF fixture and checks image metadata.
  kind: usage
  client_application: giflib-tools
  command:
  - bash
  - /validator/tests/giflib/tests/cases/usage/usage-giflib-tools-gifclrmp-map.sh
  timeout_seconds: 180
