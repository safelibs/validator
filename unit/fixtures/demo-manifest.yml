archive:
  image: ubuntu:24.04
  install_packages: []
inventory:
  verified_at: '2026-04-12T00:00:00Z'
  gh_repo_list_command: gh repo list safelibs --limit 200 --json name,nameWithOwner,isPrivate,url,defaultBranchRef
  tag_probe_rule: refs/tags/{library}/04-test
  raw_snapshot: inventory/github-repo-list.json
  filtered_snapshot: inventory/github-port-repos.json
  goal_repo_family: repos-*
  verified_repo_family: port-*
repositories:
  - name: demo
    github_repo: safelibs/port-demo
    ref: refs/tags/demo/04-test
    build:
      mode: safe-debian
      artifact_globs:
        - '*.deb'
    validator:
      sibling_repo: port-demo
      imports:
        - safe/tests
      import_excludes: []
    fixtures:
      dependents:
        source: copy-staged-root
      relevant_cves:
        source: copy-staged-root
