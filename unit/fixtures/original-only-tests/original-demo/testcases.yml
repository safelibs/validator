schema_version: 1
library: original-demo
apt_packages:
  - demo-runtime
  - demo-dev
testcases:
  - id: source-echo-roundtrip
    title: Source echo round trip
    description: Runs a small source-facing shell harness against the fixture original package surface.
    kind: source
    command:
      - bash
      - -x
      - /validator/tests/original-demo/tests/cases/source/echo-source.sh
    timeout_seconds: 300
    tags:
      - api
      - smoke
  - id: usage-client-echo
    title: Client echo smoke
    description: Runs a dependent client fixture that is declared in the dependent application inventory.
    kind: usage
    client_application: demo-client
    command:
      - bash
      - -x
      - /validator/tests/original-demo/tests/cases/usage/echo-client.sh
    timeout_seconds: 300
    tags:
      - client
