archive:
  suite: noble
  component: main
  origin: SafeLibs
  label: SafeLibs
  description: Memory-safe drop-in replacements packaged by SafeLibs for Ubuntu 24.04
  homepage: https://github.com/safelibs/apt-repo
  base_url: https://safelibs.github.io/apt-repo/
  key_name: safelibs
  pin_priority: 1001
  image: ubuntu:24.04
  install_packages:
  - ca-certificates
  - file
  - git
  - jq
  - python3
  - rsync
  - xz-utils
inventory:
  verified_at: '2026-04-12T15:47:20Z'
  gh_repo_list_command: gh repo list safelibs --limit 200 --json name,nameWithOwner,isPrivate,url,defaultBranchRef
  tag_probe_rule: refs/tags/{library}/04-test
  raw_snapshot: inventory/github-repo-list.json
  filtered_snapshot: inventory/github-port-repos.json
  goal_repo_family: repos-*
  verified_repo_family: port-*
repositories:
- name: cjson
  github_repo: safelibs/port-cjson
  ref: refs/tags/cjson/04-test
  build:
    mode: safe-debian
    artifact_globs:
    - '*.deb'
  validator:
    sibling_repo: port-cjson
    imports:
    - safe/tests
    - safe/scripts
    - original/tests
    - original/fuzzing
    - original/test.c
    - original/cJSON.h
    - original/cJSON_Utils.h
    import_excludes: []
  fixtures:
    dependents:
      source: copy-staged-root
    relevant_cves:
      source: copy-staged-root
- name: giflib
