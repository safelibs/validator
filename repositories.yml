- name: libarchive
  github_repo: safelibs/port-libarchive
  ref: refs/tags/libarchive/04-test
  build:
    mode: safe-debian
    packages:
    - clang
    - lld
    setup: "export DEB_BUILD_OPTIONS=\"${DEB_BUILD_OPTIONS:+$DEB_BUILD_OPTIONS }nostrip\
      \ noautodbgsym\"\npython3 - <<'PY'\nfrom pathlib import Path\n\nbuild_rs = Path(\"\
      safe/build.rs\")\nneedle = '        println!(\"cargo:rustc-cdylib-link-arg=-Wl,--export-dynamic-symbol=archive_set_error\"\
      );\\n'\ntext = build_rs.read_text()\nif needle not in text:\n    raise SystemExit(f\"\
      missing expected link export line in {build_rs}\")\nbuild_rs.write_text(text.replace(needle,\
      \ \"\"))\n\nrules = Path(\"safe/debian/rules\")\ncargo_build = \"cargo build\
      \ --release\"\ncargo_rustc = \"cargo rustc --release -- -Clinker=clang -Clink-arg=-fuse-ld=lld\"\
      \nrules_text = rules.read_text()\nif cargo_build not in rules_text:\n    raise\
      \ SystemExit(f\"missing expected cargo build line in {rules}\")\nrules.write_text(rules_text.replace(cargo_build,\
      \ cargo_rustc, 1))\nPY\n"
    artifact_globs:
    - '*.deb'
  validator:
    sibling_repo: port-libarchive
    imports:
    - safe/tests
    - safe/debian/tests
    - safe/scripts
    - safe/generated/api_inventory.json
    - safe/generated/cve_matrix.json
    - safe/generated/link_compat_manifest.json
    - safe/generated/original_build_contract.json
    - safe/generated/original_package_metadata.json
    - safe/generated/original_c_build
    - safe/generated/original_link_objects
    - safe/generated/original_pkgconfig/libarchive.pc
    - safe/generated/pkgconfig/libarchive.pc
    - safe/generated/rust_test_manifest.json
    - safe/generated/test_manifest.json
    - original/libarchive-3.7.2
    import_excludes: []
  fixtures:
    dependents:
      source: copy-staged-root
    relevant_cves:
      source: copy-staged-root
- name: libbz2
  github_repo: safelibs/port-libbz2
  ref: refs/tags/libbz2/04-test
  build:
    mode: safe-debian
    setup: "python3 - <<'PY'\nfrom pathlib import Path\nimport shutil\n\nrepo_root\
      \ = Path(\".\")\ncopies = {\n    \"original/bzip2.c\": \"safe/bzip2.c\",\n \
      \   \"original/bzip2recover.c\": \"safe/bzip2recover.c\",\n    \"original/bzdiff\"\
      : \"safe/bzdiff\",\n    \"original/bzgrep\": \"safe/bzgrep\",\n    \"original/bzmore\"\
      : \"safe/bzmore\",\n    \"original/bzip2.1\": \"safe/bzip2.1\",\n    \"original/bzgrep.1\"\
      : \"safe/bzgrep.1\",\n    \"original/bzmore.1\": \"safe/bzmore.1\",\n    \"\
      original/bzdiff.1\": \"safe/bzdiff.1\",\n    \"original/manual.xml\": \"safe/manual.xml\"\
      ,\n    \"original/entities.xml\": \"safe/entities.xml\",\n    \"original/manual.html\"\
      : \"safe/manual.html\",\n    \"original/manual.pdf\": \"safe/manual.pdf\",\n\
      \    \"original/manual.ps\": \"safe/manual.ps\",\n    \"original/debian/bzexe\"\
      : \"safe/debian/bzexe\",\n    \"original/debian/bzexe.1\": \"safe/debian/bzexe.1\"\
      ,\n    \"original/debian/bzip2-doc.docs\": \"safe/debian/bzip2-doc.docs\",\n\
      \    \"original/debian/bzip2-doc.doc-base\": \"safe/debian/bzip2-doc.doc-base\"\
      ,\n    \"original/debian/bzip2-doc.info\": \"safe/debian/bzip2-doc.info\",\n\
      }\n\nfor source_rel, dest_rel in copies.items():\n    source = repo_root / source_rel\n\
      \    dest = repo_root / dest_rel\n    if not source.exists():\n        raise\
      \ SystemExit(f\"missing required staged asset: {source}\")\n    dest.parent.mkdir(parents=True,\
      \ exist_ok=True)\n    shutil.copy2(source, dest)\nPY\n"
    artifact_globs:
    - '*.deb'
  validator:
    sibling_repo: port-libbz2
    imports:
    - safe/tests
    - safe/debian/tests
    - safe/scripts
    - original
    import_excludes: []
  fixtures:
    dependents:
      source: copy-staged-root
    relevant_cves:
      source: copy-staged-root
