- id: impl_phase_03_mode_aware_proof_site
  type: implement
  bounce_target: null
  prompt: |-
    Role: Software engineer implementing phase `impl_phase_03_mode_aware_proof_site` for the dual original and port 04-test validation workflow.

    This prompt is self-contained; the agent sees only this prompt. Work from the repository root, follow existing project patterns, and keep changes scoped to this phase.

    Goal:
    - Teach proof generation, site rendering, and site verification about original and port `04-test` modes.
    - Preserve original proof compatibility while enabling a second port proof and collision-free dual-mode site evidence.

    Workflow constraints:
    - Consume existing original proof and site artifacts in place. Do not overwrite `artifacts/proof/original-validation-proof.json` or regenerate checked-in `site/` in this phase.
    - Use temporary artifact/proof/site locations for smoke checks.
    - Do not duplicate or fork testcase manifests.
    - Keep `repositories.yml` unchanged.
    - Preserve unrelated user work.

    ## Preexisting Inputs
    - `repositories.yml`
    - `tools/proof.py`
    - `tools/verify_proof_artifacts.py`
    - `tools/render_site.py`
    - `scripts/verify-site.sh`
    - `unit/test_proof.py`
    - `unit/test_render_site.py`
    - Phase 2 result path and port result metadata contract.
    - Existing original proof and site artifacts, to be preserved until phase 5 regenerates them.

    ## New Outputs
    - Proof generation supports `--mode original` and `--mode port-04-test`.
    - Original proof generation remains path-compatible and gains top-level `mode: "original"` for dual-mode rendering.
    - Port proof generation supports `artifacts/proof/port-04-test-validation-proof.json`; phase 5 generates and commits the real port proof.
    - Site rendering accepts multiple `--proof-path` values and renders original and port rows without collisions.
    - Site verification accepts multiple `--proof-path` values and rebuilds each proof using its mode.

    ## File Changes
    - Modify `tools/proof.py`.
    - Modify `tools/verify_proof_artifacts.py`.
    - Modify `tools/render_site.py`.
    - Modify `scripts/verify-site.sh`.
    - Modify `unit/test_proof.py`.
    - Modify `unit/test_render_site.py`.

    ## Implementation Details
    - In `tools/proof.py`:
      - Add valid modes `{"original", "port-04-test"}`.
      - Add `mode: str = "original"` to `build_proof()`.
      - Use mode-specific artifact path prefixes matching phase 2.
      - Change `load_result()` to accept `expected_mode`.
      - Keep original mode strict:
        - `mode` must be `original`.
        - `override_debs_installed` must be `false`.
        - No `port_*` metadata fields, no `unported_original_packages`, and no `override_installed_packages` field may be present.
      - Add port mode strictness:
        - `mode` must be `port-04-test`.
        - `override_debs_installed` must be `true`.
        - Required port fields must be present: `port_repository`, `port_tag_ref`, `port_commit`, `port_release_tag`, `port_debs`, `unported_original_packages`, `override_installed_packages`.
        - `port_commit` must be 40 lowercase hex characters.
        - `port_release_tag` must equal `build-<commit[:12]>`.
        - `port_debs` must be a non-empty list of `{package, filename, architecture, sha256, size}` objects ordered by the testcase manifest `apt_packages`; architecture must be `amd64` or `all`.
        - `unported_original_packages` must be the complementary ordered subset of testcase manifest `apt_packages`.
        - `port_debs[*].package` plus `unported_original_packages` must be disjoint and combine to the exact canonical `apt_packages` list in manifest order.
        - `override_installed_packages` must be a list of `{package, version, architecture, filename}` objects whose package, filename, and architecture order equals `port_debs`.
      - Update expected result/log/cast paths by mode:
        - Original: `results/<library>/<testcase>.json`, `logs/...`, `casts/...`.
