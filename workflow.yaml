        --port-repos inventory/github-port-repos.json \
        --output-root artifacts/debs/port-04-test \
        --lock-output artifacts/proof/port-04-test-debs-lock.json

      set +e
      bash test.sh \
        --config repositories.yml \
        --tests-root tests \
        --artifact-root artifacts \
        --mode original \
        --record-casts
      original_matrix_exit=$?

      bash test.sh \
        --config repositories.yml \
        --tests-root tests \
        --artifact-root artifacts \
        --mode port-04-test \
        --override-deb-root artifacts/debs/port-04-test \
        --port-deb-lock artifacts/proof/port-04-test-debs-lock.json \
        --record-casts
      port_matrix_exit=$?
      set -e

      python3 tools/verify_proof_artifacts.py \
        --config repositories.yml \
        --tests-root tests \
        --artifact-root artifacts \
        --proof-output artifacts/proof/original-validation-proof.json \
        --mode original \
        --min-source-cases 95 \
        --min-usage-cases 193 \
        --min-cases 288 \
        --require-casts

      python3 tools/verify_proof_artifacts.py \
        --config repositories.yml \
        --tests-root tests \
        --artifact-root artifacts \
        --proof-output artifacts/proof/port-04-test-validation-proof.json \
        --mode port-04-test \
        --min-source-cases 95 \
        --min-usage-cases 193 \
        --min-cases 288 \
        --require-casts

      python3 tools/render_site.py \
        --config repositories.yml \
        --tests-root tests \
        --artifact-root artifacts \
        --proof-path artifacts/proof/original-validation-proof.json \
        --proof-path artifacts/proof/port-04-test-validation-proof.json \
        --output-root site

      python3 - <<'PY'
      import json
      from pathlib import Path
      for proof_path in [
          Path("artifacts/proof/original-validation-proof.json"),
          Path("artifacts/proof/port-04-test-validation-proof.json"),
      ]:
          proof = json.loads(proof_path.read_text())
          if proof["totals"]["failed"] != 0:
              raise SystemExit(f"{proof_path} has failed cases: {proof['totals']['failed']}")
      PY

      test "$original_matrix_exit" -eq 0
      test "$port_matrix_exit" -eq 0
      ```
    - Capture matrix exit codes and continue through proof and site generation so failed rows still have logs, casts, proofs, and rendered evidence.
    - Do not hide or coerce failures. Original and port failures are both gating validation failures.
    - Original mode must have 0 failures in final proof.
    - Port mode must have 0 failures in final proof.
    - Port mode must have exactly the same testcase IDs, order, source/usage split, and libraries as original mode.
    - Port proof library objects and port result rows must prove that override debs were installed with `override_installed_packages`.
    - Port proof/result provenance must carry port repository, commit, release, selected deb checksum/architecture provenance, and `unported_original_packages` that exactly match `artifacts/proof/port-04-test-debs-lock.json`.
    - Commit final evidence:
      - Force-add new intended ignored proof/site files.
      - Do not add `artifacts/debs/`.
      - Confirm `git ls-files artifacts/debs` prints nothing.
      - Confirm `git ls-files artifacts/proof/port-04-test-debs-lock.json artifacts/proof/port-04-test-validation-proof.json site/site-data.json` prints all three paths.

    ## Verification To Run Before Commit
    Run both phase 5 check command sets after generating artifacts and before committing.

    ## Git Commit Requirement
    Commit all phase 5 scoped generated evidence to git before yielding. Do not yield with uncommitted phase 5 file changes. The `.deb` cache remains uncommitted.

- id: check_phase_05_full_dual_artifact_contract
  type: check
  bounce_target: impl_phase_05_full_artifacts
  prompt: |-
    Reviewer Role: QA checker for the full dual-artifact contract.

    Verify these specific things:
    - Unit tests and testcase manifest validation pass at 95 source, 193 usage, and 288 total cases.
    - Original proof reports mode `original`, 19 libraries, 288 cases, 95 source cases, 193 usage cases, 0 failures, 288 passes, and 288 casts.
    - Port proof reports mode `port-04-test`, the same totals, 0 failures, 288 passes, and 288 casts.
    - Original and port proofs have identical library/testcase coverage and order.
    - `artifacts/proof/port-04-test-debs-lock.json` has 19 libraries, mode `port-04-test`, and agrees exactly with every port proof library and every port result row.
    - Port result rows are under `port-04-test/results`, logs under `port-04-test/logs`, and casts under `port-04-test/casts`.
    - Every port result has `override_debs_installed: true`, matching port provenance, and `override_installed_packages` aligned with `port_debs`.
    - New intended proof/site evidence files are tracked, while downloaded `artifacts/debs` remain untracked.
    - No unrelated changes to `.plan/goal.md` or old phase files were introduced.
    - Phase 5 work was committed to git before yielding.

    Run these commands:
    ```bash
    python3 -m unittest discover -s unit -v
    python3 tools/testcases.py \
      --config repositories.yml \
      --tests-root tests \
      --check \
      --min-source-cases 95 \
      --min-usage-cases 193 \
      --min-cases 288

    python3 - <<'PY'
    import json
    import subprocess
    from pathlib import Path
    import yaml
    artifact_root = Path("artifacts")
    original = json.loads((artifact_root / "proof/original-validation-proof.json").read_text())
    port = json.loads((artifact_root / "proof/port-04-test-validation-proof.json").read_text())
    lock = json.loads((artifact_root / "proof/port-04-test-debs-lock.json").read_text())
    manifest = yaml.safe_load(Path("repositories.yml").read_text())
    packages = {entry["name"]: entry["apt_packages"] for entry in manifest["libraries"]}
    assert original["totals"]["libraries"] == 19
    assert original["totals"]["cases"] == 288
    assert original["totals"]["source_cases"] == 95
    assert original["totals"]["usage_cases"] == 193
    assert original["totals"]["failed"] == 0
    assert original["totals"]["passed"] == 288
    assert original["totals"]["casts"] == 288
    assert original["mode"] == "original"
    assert port["totals"]["libraries"] == 19
    assert port["totals"]["cases"] == 288
    assert port["totals"]["source_cases"] == 95
    assert port["totals"]["usage_cases"] == 193
    assert port["totals"]["failed"] == 0
    assert port["totals"]["passed"] == 288
    assert port["totals"]["casts"] == 288
    assert port["mode"] == "port-04-test"
    assert lock["mode"] == "port-04-test"
    assert len(lock["libraries"]) == 19
    def ids(proof):
        return {
            entry["library"]: [case["testcase_id"] for case in entry["testcases"]]
            for entry in proof["libraries"]
        }
    assert ids(original) == ids(port)
    lock_libraries = [entry["library"] for entry in lock["libraries"]]
    port_libraries = [entry["library"] for entry in port["libraries"]]
    assert lock_libraries == port_libraries
    lock_by_library = {entry["library"]: entry for entry in lock["libraries"]}
    for entry in port["libraries"]:
        lock_entry = lock_by_library[entry["library"]]
        expected_debs = [
            {key: deb[key] for key in ("package", "filename", "architecture", "sha256", "size")}
            for deb in lock_entry["debs"]
        ]
        ported_packages = [deb["package"] for deb in expected_debs]
        assert set(ported_packages).issubset(packages[entry["library"]])
        assert set(lock_entry["unported_original_packages"]).issubset(packages[entry["library"]])
        combined = []
        for package in packages[entry["library"]]:
            if package in ported_packages or package in lock_entry["unported_original_packages"]:
                combined.append(package)
        assert combined == packages[entry["library"]]
        assert set(ported_packages).isdisjoint(lock_entry["unported_original_packages"])
        assert expected_debs
        assert all(deb["architecture"] in {"amd64", "all"} for deb in expected_debs)
        assert lock_entry["release_tag"] == "build-" + lock_entry["commit"][:12]
        assert entry["port_repository"] == lock_entry["repository"]
        assert entry["port_tag_ref"] == lock_entry["tag_ref"]
        assert entry["port_commit"] == lock_entry["commit"]
        assert entry["port_release_tag"] == lock_entry["release_tag"]
        assert entry["port_debs"] == expected_debs
        assert entry["unported_original_packages"] == lock_entry["unported_original_packages"]
        for case in entry["testcases"]:
            assert case["mode"] == "port-04-test"
            assert case["result_path"].startswith("port-04-test/results/")
            assert case["log_path"].startswith("port-04-test/logs/")
            assert case["cast_path"].startswith("port-04-test/casts/")
            result = json.loads((artifact_root / case["result_path"]).read_text())
            assert result["override_debs_installed"] is True
            assert result["port_repository"] == lock_entry["repository"]
            assert result["port_tag_ref"] == lock_entry["tag_ref"]
            assert result["port_commit"] == lock_entry["commit"]
            assert result["port_release_tag"] == lock_entry["release_tag"]
            assert result["port_debs"] == expected_debs
            assert result["unported_original_packages"] == lock_entry["unported_original_packages"]
            assert result["override_installed_packages"]
            assert [item["package"] for item in result["override_installed_packages"]] == [
                item["package"] for item in result["port_debs"]
            ]
            assert [item["filename"] for item in result["override_installed_packages"]] == [
                item["filename"] for item in result["port_debs"]
            ]
            assert [item["architecture"] for item in result["override_installed_packages"]] == [
                item["architecture"] for item in result["port_debs"]
            ]
    tracked = set(subprocess.check_output([
        "git",
        "ls-files",
        "artifacts/proof/port-04-test-debs-lock.json",
        "artifacts/proof/port-04-test-validation-proof.json",
        "site/site-data.json",
    ], text=True).splitlines())
    required = {
        "artifacts/proof/port-04-test-debs-lock.json",
        "artifacts/proof/port-04-test-validation-proof.json",
        "site/site-data.json",
    }
    missing = sorted(required - tracked)
    assert not missing, missing
    tracked_debs = subprocess.check_output(["git", "ls-files", "artifacts/debs"], text=True).strip()
    assert tracked_debs == "", tracked_debs
    PY
    ```

    If any command fails or any verification item is not satisfied, report a failing verdict with the concrete reason.

    End your response with exactly one of:
    VERDICT: PASS
    VERDICT: FAIL: <reason>

