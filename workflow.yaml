name: validator-dual-original-port-04-test
backend: codex
working_dir: .
max_bounces: 999
linear: true
yaml_source_mode: inline-only
verifier_encoding: explicit-phases
vars:
  GOAL: Run the existing reference tests on original Ubuntu packages and the same tests with latest safelibs port 04-test debs.
phases:
- id: impl_phase_01_port_deb_resolver
  type: implement
  bounce_target: null
  prompt: |-
    Role: Software engineer implementing phase `impl_phase_01_port_deb_resolver` for the dual original and port 04-test validation workflow.

    This prompt is self-contained; the agent sees only this prompt. Work from the repository root, follow existing project patterns, and keep changes scoped to this phase.

    Goal:
    - Preserve the original Ubuntu-package reference validation.
    - Add a resolver that consumes the existing safelibs port repository inventory and downloads the latest tagged `04-test` native deb assets with deterministic lock/provenance output.

    Workflow constraints:
    - Consume existing workspace artifacts in place. Do not refetch, recollect, rediscover, or regenerate existing manifests, dependent inventories, testcase fixtures, Docker harnesses, original matrix artifacts, original proof data, or rendered site evidence from scratch.
    - Use `inventory/github-port-repos.json` as the authoritative source of port repository identity. Do not scan GitHub, enumerate repositories, or rebuild that inventory.
    - Keep `repositories.yml` limited to the original v2 manifest schema. Do not add port metadata to it.
    - Do not duplicate or fork testcase manifests for port runs.
    - Resolve commits dynamically at run time. Do not bake current hashes, release tags, or asset lists into source files.
    - Preserve unrelated user work.

    ## Preexisting Inputs
    - `.plan/goal.md`
    - `.plan/plan.md`
    - `repositories.yml`
    - `inventory/github-port-repos.json`
    - `tools/github_auth.py`
    - `tools/__init__.py`
    - Existing unit fixture patterns under `unit/fixtures/`
    - Existing original artifacts under `artifacts/results`, `artifacts/logs`, `artifacts/casts`, `artifacts/proof/original-validation-proof.json`, and `site/`; consume these in place and do not regenerate them in this phase.
    - GitHub access through `GH_TOKEN`, `VALIDATOR_REPO_TOKEN`, or `gh auth token` when port repositories are private.

    ## New Outputs
    - New resolver CLI `tools/fetch_port_debs.py`.
    - New unit tests in `unit/test_port_debs.py`.
    - New unit fixture `unit/fixtures/port-repos.json`.
    - Generated ignored deb cache layout compatible with existing matrix override mounting: `<output-root>/<library>/*.deb`.
    - Generated lock/provenance JSON at caller-provided `--lock-output`, suitable for committing later as `artifacts/proof/port-04-test-debs-lock.json`.

    ## Implementation Details
    - Implement `tools/fetch_port_debs.py` as a direct CLI that works with `python3 tools/fetch_port_debs.py ...`.
    - Set `sys.dont_write_bytecode = True` when invoked as a script, matching the style in `tools/testcases.py`.
    - Define dataclasses:
      - `PortRepo(library: str, name_with_owner: str, url: str, default_branch: str, tag_ref: str)`
      - `ResolvedPortDeb(library: str, repository: str, tag_ref: str, commit: str, release_tag: str, package: str, filename: str, architecture: str, sha256: str, size: int, asset_url: str | None, browser_download_url: str | None)`
    - CLI arguments:
      - `--config`, required `Path`.
      - `--port-repos`, required `Path`, normally `inventory/github-port-repos.json`.
      - `--output-root`, required `Path`, written as `<output-root>/<library>/*.deb`.
      - `--lock-output`, required `Path`.
      - `--library`, repeatable optional selection using `select_libraries()` order.
    - Validation rules:
      - Load `repositories.yml` with `load_manifest()`.
      - Load `inventory/github-port-repos.json` as a JSON list.
      - Reject duplicate libraries and unknown libraries.
      - For selected libraries, require exactly one port repo entry for each selected library.
      - Require `nameWithOwner == "safelibs/port-<library>"`, preserving hyphens.
      - Require `tag_ref == "refs/tags/<library>/04-test"`.
    - Output cleanup:
      - For each selected library, create `<output-root>/<library>`.
      - Before writing new files for a selected library, remove existing `.deb` files in that selected library leaf only.
      - Do not delete unselected library leaves and do not remove non-`.deb` files.
    - Commit resolution:
      - Use `tools.github_auth.github_git_url()` and `tools.github_auth.git_env()` with `tools.run(..., capture_output=True)` so tokens are redacted and noninteractive settings follow existing conventions.
      - Do not use `tools.github_auth.run_git()` for this command because it does not return captured output.
      - Resolve both `tag_ref` and peeled `tag_ref^{}` with `git ls-remote`; use the peeled object when present so annotated tags resolve to a commit hash.
      - Validate the selected commit as a 40-character lowercase hex string.
      - Derive `release_tag = "build-" + commit[:12]`.
    - Release resolution and downloads:
      - Query `https://api.github.com/repos/<owner>/<repo>/releases/tags/<release_tag>`.
      - Use headers `Accept: application/vnd.github+json` and `X-GitHub-Api-Version: 2022-11-28`.
      - Use a bearer token from `effective_github_token()` when available.
      - Identify `.deb` assets whose Debian package name, parsed from the filename before the first `_`, is in the canonical `apt_packages` list for that library.
      - Parse architecture from the final underscore segment before `.deb`; select only `amd64` and `all` assets.
      - Ignore canonical package assets for other architectures.
      - Reject duplicate selected assets for the same canonical package after architecture filtering.
      - Require at least one selected port `.deb` for every selected library.
      - Do not fail when a canonical package has no selected port asset; record that package in `unported_original_packages` in manifest order.
      - Allow extra release assets, but ignore them unless they are in `repositories.yml` `apt_packages`.
      - Download assets through the GitHub asset API URL with `Accept: application/octet-stream` and auth headers. Use `browser_download_url` only as display metadata.
      - Write each file atomically through a temporary file in the target leaf directory, then rename.
      - Compute SHA256 and size after download.
      - Require `dpkg-deb`; verify `dpkg-deb --field <deb> Package` and `Architecture` match the selected package and architecture.
      - Keep token-bearing URLs and bearer tokens out of exception text.
    - Lock schema:
      - Write deterministic JSON with two-space indentation and a trailing newline. Do not use wall-clock time.
      - Top-level fields in this order: `schema_version: 1`, `mode: "port-04-test"`, `generated_at: "1970-01-01T00:00:00Z"`, `source_config`, `source_inventory`, `libraries`.
      - `source_config` and `source_inventory` must be the POSIX path strings passed to `--config` and `--port-repos`.
      - Per-library fields: `library`, `repository`, `url`, `tag_ref`, `commit`, `release_tag`, `debs`, `unported_original_packages`.
      - Per-deb fields: `package`, `filename`, `architecture`, `sha256`, `size`, `asset_api_url`, `browser_download_url`.
      - Preserve manifest order for libraries, canonical `apt_packages` order for selected debs, and canonical `apt_packages` order for `unported_original_packages`.
      - For every library, `debs[*].package` plus `unported_original_packages` must be disjoint and must combine to the exact canonical `apt_packages` list in manifest order.
    - Unit tests:
      - Mock `git ls-remote` and GitHub API responses.
      - Assert tag peeling and `build-<sha12>` release derivation.
      - Assert canonical package filtering ignores extra assets, ignores non-native architecture assets, records missing canonical packages in `unported_original_packages`, requires at least one selected port asset per library, and fails duplicate selected assets for the same canonical package.
      - Assert stale `.deb` cleanup in a selected library leaf.
      - Assert lock output is deterministic and ordered.
      - Assert tokens are not surfaced in exception text by relying on existing `tools.run()` redaction.

    ## Verification To Run Before Commit
    ```bash
    python3 -m unittest unit.test_port_debs -v
    python3 -m unittest unit.test_inventory -v
    python3 -m unittest unit.test_repository_hygiene -v
    ```

    Also run the live smoke command from `check_phase_01_live_resolution_smoke` when credentials/network are available, but write smoke outputs only under `/tmp/validator-port-debs-smoke`.

    ## Git Commit Requirement
    Commit all phase 1 scoped work to git before yielding. Do not yield with uncommitted phase 1 file changes.

- id: check_phase_01_fetcher_unit_contract
  type: check
  bounce_target: impl_phase_01_port_deb_resolver
  prompt: |-
    Reviewer Role: QA checker for the phase 1 port deb resolver unit contract.

    Verify these specific things:
    - `tools/fetch_port_debs.py` exists and implements the resolver/lock schema without modifying `repositories.yml` or `inventory/github-port-repos.json`.
    - The resolver consumes `inventory/github-port-repos.json` as authoritative and does not scan GitHub repositories.
    - The resolver dynamically resolves `refs/tags/<library>/04-test`, derives `build-<sha12>`, filters native canonical `.deb` assets, records `unported_original_packages`, and redacts tokens from errors.
    - Unit tests cover tag peeling, asset filtering, native architecture selection, deterministic lock output, stale `.deb` cleanup, duplicate package rejection, and token redaction.
    - Existing original artifacts, proof, site, testcase manifests, and fixtures were not regenerated or refetched.
    - Phase 1 work was committed to git before yielding.

    Run these commands:
    ```bash
    python3 -m unittest unit.test_port_debs -v
    python3 -m unittest unit.test_inventory -v
    python3 -m unittest unit.test_repository_hygiene -v
    ```

    If any command fails or any verification item is not satisfied, report a failing verdict with the concrete reason.

    End your response with exactly one of:
    VERDICT: PASS
    VERDICT: FAIL: <reason>

- id: check_phase_01_live_resolution_smoke
  type: check
  bounce_target: impl_phase_01_port_deb_resolver
  prompt: |-
    Reviewer Role: QA checker for live port deb resolution and lock smoke coverage.

    Verify these specific things:
    - The resolver consumes the real `inventory/github-port-repos.json`.
    - It resolves current `04-test` commits for `cjson`, `giflib`, `liblzma`, and `libuv`.
    - It locates matching `build-<sha12>` releases and downloads only selected native canonical `.deb` assets.
    - The smoke lock has deterministic schema fields, full 40-character commits, correct release tags, selected deb checksums, and explicit `unported_original_packages`.
    - Downloaded `.deb` files are written only under `/tmp/validator-port-debs-smoke/debs`.

    Run these commands:
    ```bash
    rm -rf /tmp/validator-port-debs-smoke
    python3 tools/fetch_port_debs.py \
      --config repositories.yml \
      --port-repos inventory/github-port-repos.json \
      --output-root /tmp/validator-port-debs-smoke/debs \
      --lock-output /tmp/validator-port-debs-smoke/port-04-test-debs-lock.json \
      --library cjson \
      --library giflib \
      --library liblzma \
      --library libuv

    python3 - <<'PY'
    import json
    from pathlib import Path
    import yaml
    root = Path("/tmp/validator-port-debs-smoke")
    lock = json.loads((root / "port-04-test-debs-lock.json").read_text())
    manifest = yaml.safe_load(Path("repositories.yml").read_text())
    packages = {entry["name"]: entry["apt_packages"] for entry in manifest["libraries"]}
    assert lock["schema_version"] == 1
    assert lock["mode"] == "port-04-test"
    assert [entry["library"] for entry in lock["libraries"]] == ["cjson", "giflib", "liblzma", "libuv"]
    for entry in lock["libraries"]:
        assert entry["commit"] and len(entry["commit"]) == 40
        assert entry["release_tag"] == "build-" + entry["commit"][:12]
        assert entry["debs"]
        assert len(entry["unported_original_packages"]) == len(set(entry["unported_original_packages"]))
        ported = [deb["package"] for deb in entry["debs"]]
        assert set(ported).issubset(packages[entry["library"]])
        assert set(entry["unported_original_packages"]).issubset(packages[entry["library"]])
        combined = []
        for package in packages[entry["library"]]:
            if package in ported or package in entry["unported_original_packages"]:
                combined.append(package)
        assert combined == packages[entry["library"]]
        assert set(ported).isdisjoint(entry["unported_original_packages"])
        leaf = root / "debs" / entry["library"]
        assert leaf.is_dir()
        assert sorted(path.name for path in leaf.glob("*.deb")) == sorted(deb["filename"] for deb in entry["debs"])
        for deb in entry["debs"]:
            assert (leaf / deb["filename"]).is_file()
            assert deb["architecture"] in {"amd64", "all"}
            assert deb["sha256"] and len(deb["sha256"]) == 64
    PY
    ```

    If any command fails or any verification item is not satisfied, report a failing verdict with the concrete reason.

    End your response with exactly one of:
    VERDICT: PASS
    VERDICT: FAIL: <reason>

- id: impl_phase_02_mode_aware_matrix
  type: implement
  bounce_target: null
  prompt: |-
    Role: Software engineer implementing phase `impl_phase_02_mode_aware_matrix` for the dual original and port 04-test validation workflow.

    This prompt is self-contained; the agent sees only this prompt. Work from the repository root, follow existing project patterns, and keep changes scoped to this phase.

    Goal:
    - Make the matrix runner mode-aware while preserving legacy original artifact paths.
    - Add first-class port `04-test` result paths and provenance copied from the phase 1 lock.

    Workflow constraints:
    - Consume existing workspace artifacts in place. Do not move or regenerate checked-in original `artifacts/results`, `artifacts/logs`, or `artifacts/casts` in this phase.
    - Do not duplicate or fork testcase manifests for port runs.
    - Do not modify `test.sh`; it already forwards arguments to `tools/run_matrix.py`.
    - Keep `repositories.yml` and `inventory/github-port-repos.json` unchanged.
    - Preserve unrelated user work.

    ## Preexisting Inputs
    - `repositories.yml`
    - `inventory/github-port-repos.json`
    - `tools/run_matrix.py`
    - `test.sh`
    - `tests/_shared/install_override_debs.sh`
    - `tests/_shared/run_library_tests.sh`
    - `unit/test_run_matrix.py`
    - `unit/fixtures/original-override-debs/original-demo/original-override-marker_1.0_all.deb`
    - Phase 1 lock schema and resolver output contract.
    - Existing original artifacts under `artifacts/results`, `artifacts/logs`, and `artifacts/casts`; consume these in place and do not move them.

    ## New Outputs
    - `tools/run_matrix.py` accepts `--mode original` and `--mode port-04-test`.
    - Original mode continues writing legacy paths under `results/`, `logs/`, and `casts/`.
    - Port mode writes under `port-04-test/results/`, `port-04-test/logs/`, and `port-04-test/casts/`.
    - Port result JSONs include mode and port deb provenance from the lock file.
    - Override install status includes enough information to verify that override debs were actually installed.
    - Result JSONs normalize installed package status into canonical lock order.
    - Port result JSONs include `unported_original_packages` from the lock file.

    ## File Changes
    - Modify `tools/run_matrix.py`.
    - Modify `tests/_shared/install_override_debs.sh`.
    - Modify `unit/test_run_matrix.py`.
    - Do not modify `test.sh`.

    ## Implementation Details
    - Extend `MatrixArgs` with:
      - `mode: str`, accepting exactly `"original"` and `"port-04-test"`.
      - `port_deb_lock: Path | None`.
    - CLI changes:
      - Keep `--mode`, default `"original"`.
      - Add `--port-deb-lock`, optional `Path`.
    - Validation:
      - Reject unknown modes.
      - For `mode == "port-04-test"`, require both `--override-deb-root` and `--port-deb-lock`.
      - For `mode == "original"`, do not require a lock. Existing generic `--override-deb-root` may continue to work as a local hook, but official proof will reject original results with overrides.
    - Add a helper equivalent to:
      ```python
      def artifact_mode_parts(mode: str) -> tuple[str, ...]:
          if mode == "original":
              return ()
          if mode == "port-04-test":
              return ("port-04-test",)
          raise ValidatorError(f"unsupported mode: {mode}")
      ```
    - Use `artifact_mode_parts(mode)` everywhere result, log, cast, Docker build log, and summary paths are constructed.
      - Original result path remains `results/<library>/<testcase>.json`.
      - Port result path is `port-04-test/results/<library>/<testcase>.json`.
      - Apply the same pattern for logs, casts, `docker-build.log`, and `summary.json`.
    - Update `write_unrun_result()`, `run_testcase()`, and `write_library_summary()` to accept `mode`.
    - Update `_result_payload()` to set `mode` from the run mode instead of hardcoding original.
    - Add a lock loader in `run_matrix.py` or a shared helper:
      - Validate top-level `schema_version == 1` and `mode == "port-04-test"`.
      - Validate selected libraries are present.
      - Validate each lock library has `repository`, `tag_ref`, `commit`, `release_tag`, `debs`, and `unported_original_packages`.
      - Validate lock `debs[*].package` is a non-empty ordered subset of canonical apt packages, `unported_original_packages` is the complementary ordered subset, and the two lists combine to the exact canonical `apt_packages` list in manifest order.
      - Validate every lock deb has `package`, `filename`, `architecture`, `sha256`, and `size`; architecture must be `amd64` or `all`.
      - Validate deb files named in the lock exist in `--override-deb-root/<library>/` and have the recorded SHA256.
      - Reject extra `.deb` files in a selected library leaf that are not named in the lock, because `install_override_debs.sh` installs every mounted `.deb`.
      - Validate the lock and checksums before building Docker images or writing port result artifacts.
    - Pass per-library port metadata into every port result using stable fields:
      - `port_repository`
      - `port_tag_ref`
      - `port_commit`
      - `port_release_tag`
      - `port_debs`, a non-empty list of `{package, filename, architecture, sha256, size}`
      - `unported_original_packages`
    - Original results must not include `port_*` fields or `unported_original_packages`.
    - Extend `tests/_shared/install_override_debs.sh`:
      - Keep existing marker behavior.
      - After successful install, write `${VALIDATOR_STATUS_DIR:-/validator/status}/override-installed-packages.tsv`.
      - The TSV has no header, is sorted by input filename, and contains package, version, architecture, and filename as four tab-separated columns.
      - Use `dpkg-deb --field` to avoid filename parsing inside the container.
    - Update `run_testcase()` to read `override-installed-packages.tsv` before removing the status directory.
    - For `mode == "port-04-test"`:
      - Require the TSV to exist whenever `override_debs_installed` is true.
      - Parse TSV records and validate every record matches exactly one lock `port_debs` entry by package, filename, and architecture.
      - Reject missing or extra installed packages.
      - Include `override_installed_packages` in every result as `{package, version, architecture, filename}` objects ordered to match `port_debs`.
    - For `mode == "original"`, include `override_installed_packages` only for local override hook runs where the TSV exists.
    - Keep Docker image caching keyed by library and shared image tag.
    - Unit tests:
      - Update the old original-only mode test to assert original and port modes are accepted and other modes are rejected.
      - Add tests that port mode requires override root and lock path.
      - Add tests that original mode preserves legacy artifact paths.
      - Add tests that port mode writes prefixed artifact paths and `mode: port-04-test`.
      - Add tests that lock metadata, including `unported_original_packages`, is copied into each port result.
      - Add tests that hash mismatches and extra `.deb` files in selected port override leaves are rejected.
      - Add tests that `override_installed_packages` is recorded in canonical `port_debs` order and that an install marker without package status fails.
      - Keep existing override-root layout tests passing.

    ## Verification To Run Before Commit
    ```bash
    python3 -m unittest unit.test_run_matrix -v
    python3 -m unittest unit.test_port_debs -v
    ```

    Confirm `git diff -- artifacts/results artifacts/logs artifacts/casts` is empty after unit checks.

    ## Git Commit Requirement
    Commit all phase 2 scoped work to git before yielding. Do not yield with uncommitted phase 2 file changes.

- id: check_phase_02_run_matrix_unit_contract
  type: check
  bounce_target: impl_phase_02_mode_aware_matrix
  prompt: |-
    Reviewer Role: QA checker for the phase 2 run-matrix unit contract.

    Verify these specific things:
    - `tools/run_matrix.py` accepts only `original` and `port-04-test` modes.
    - Original mode preserves legacy result, log, cast, build-log, and summary paths.
    - Port mode requires `--override-deb-root` and `--port-deb-lock`.
    - Port mode validates lock schema, selected checksums, missing and extra debs, and canonical package ordering before running Docker work.
    - Port result JSONs contain the required provenance and `override_installed_packages` in canonical `port_debs` order.
    - Original official results do not contain port provenance fields.
    - `tests/_shared/install_override_debs.sh` writes the TSV status file while preserving existing marker behavior.
    - Checked-in original artifacts were not regenerated in this phase.
    - Phase 2 work was committed to git before yielding.

    Run these commands:
    ```bash
    python3 -m unittest unit.test_run_matrix -v
    python3 -m unittest unit.test_port_debs -v
    ```

    If any command fails or any verification item is not satisfied, report a failing verdict with the concrete reason.

    End your response with exactly one of:
    VERDICT: PASS
    VERDICT: FAIL: <reason>

